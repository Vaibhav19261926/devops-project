name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: devops-demo-api

jobs:
  # ── Job 1: Test & Lint ──────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "No tests directory found — skipping"

      - name: Build Docker image (smoke test)
        run: docker build -t $IMAGE_NAME:test .

  # ── Job 2: Deploy to AWS EC2 ────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "==> Navigating to project directory"
            cd /home/${{ secrets.EC2_USER }}/devops-project

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Writing .env from GitHub Secrets"
            cat > .env << 'ENVEOF'
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ENVIRONMENT=production
            ENVEOF

            echo "==> Building and restarting containers (zero-downtime rolling)"
            docker compose build --no-cache api
            docker compose up -d --no-deps api
            
            echo "==> Waiting for API health check..."
            sleep 15
            docker compose exec -T api python -c \
              "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status(); print('Health OK:', r.json())"

            echo "==> Reloading NGINX"
            docker compose exec -T nginx nginx -s reload

            echo "==> Cleaning up unused images"
            docker image prune -f

            echo "==> Deployment complete! ✅"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment FAILED. Check the logs above."
          # Add Slack/email notification here if needed
